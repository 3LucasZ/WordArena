<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Hunt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0d0d28 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #game {
    width: 100%;
    max-width: 480px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100dvh;
    gap: 0;
  }

  /* ---- LOADING SCREEN ---- */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0d0d28 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: #4a90d9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { margin-top: 16px; font-size: 16px; color: rgba(255,255,255,0.6); }

  /* ---- HEADER ---- */
  header {
    width: 100%;
    text-align: center;
    padding: 8px 0 4px 0;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #4a90d9, #7c5cbf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 360px;
    margin: 4px auto 0;
    padding: 4px 0;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    min-width: 40px;
  }
  /* ---- BOARD ---- */
  #board-wrapper {
    position: relative;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1;
    flex-shrink: 0;
    margin: 8px 0;
    touch-action: none;
  }
  #board-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    border-radius: 16px;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    touch-action: none;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 700;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
    cursor: pointer;
    touch-action: none;
    position: relative;
    z-index: 2;
  }
  .cell.selected {
    background: linear-gradient(135deg, #4a90d9, #357abd);
    transform: scale(0.95);
  }
  .cell.selected-valid,
  .cell.selected-valid.first {
    background: linear-gradient(135deg, #34c759, #28a745);
    transform: scale(0.95);
  }
  .cell.selected-dup,
  .cell.selected-dup.first {
    background: linear-gradient(135deg, #ff9500, #cc7a00);
    transform: scale(0.95);
  }
  .cell.first {
    background: linear-gradient(135deg, #4a90d9, #3a7bd5);
    box-shadow: 0 0 16px rgba(74,144,217,0.4);
  }

  /* ---- CURRENT WORD ---- */
  #current-word-area {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 100%;
    max-width: 360px;
  }
  #current-word {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.9);
    transition: color 0.15s;
  }
  #current-word.hint { font-size: 16px; color: rgba(255,255,255,0.4); letter-spacing: normal; font-weight: 400; }


  /* ---- SCORE POPUP ---- */
  #score-popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 28px;
    font-weight: 800;
    color: #34c759;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 2px 12px rgba(52,199,89,0.4);
    opacity: 0;
    transition: none;
  }
  #score-popup.show {
    animation: scorePopup 0.8s ease-out forwards;
  }
  @keyframes scorePopup {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -60%) scale(1); opacity: 0; }
  }

  /* ---- WORD LIST ---- */
  #word-list {
    flex: 1;
    width: 100%;
    max-width: 360px;
    min-height: 0;
    display: flex;
    flex-direction: column;
    flex-shrink: 1;
  }
  #word-list-header {
    display: flex;
    justify-content: space-between;
    padding: 4px 4px 4px 0;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  #words-container {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding-right: 4px;
  }
  #words-container::-webkit-scrollbar { width: 3px; }
  #words-container::-webkit-scrollbar-track { background: transparent; }
  #words-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .word-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 8px;
    border-radius: 8px;
    margin-bottom: 2px;
    animation: slideIn 0.3s ease-out;
    background: rgba(255,255,255,0.03);
  }
  .word-entry:first-child { animation: slideIn 0.3s ease-out, glowNew 0.6s ease-out; }
  @keyframes slideIn {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes glowNew {
    0% { background: rgba(52,199,89,0.15); }
    100% { background: rgba(255,255,255,0.03); }
  }
  .word-entry .word-text { font-size: 16px; font-weight: 600; }
  .word-entry .word-score { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.5); }

  /* ---- CONTROLS ---- */
  #controls {
    width: 100%;
    max-width: 360px;
    padding: 8px 0 12px;
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }
  #controls button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    touch-action: manipulation;
  }
  #controls button:active { transform: scale(0.96); }
  #btn-new {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  #btn-new:hover { background: rgba(255,255,255,0.15); }

  /* ---- HELPER ---- */
  .empty-state { text-align: center; color: rgba(255,255,255,0.2); font-size: 14px; padding: 24px 0; }
</style>
</head>
<body>

<div id="game">
  <header>
    <h1>WORD HUNT</h1>
    <div class="stats">
      <div class="stat">
        <span>SCORE</span>
        <span class="stat-value" id="score">0</span>
      </div>
    </div>
  </header>

  <div id="board-wrapper">
    <canvas id="board-lines"></canvas>
    <div id="board"></div>
    <div id="score-popup"></div>
  </div>

  <div id="current-word-area">
    <div id="current-word">&nbsp;</div>
  </div>

  <div id="word-list">
    <div id="word-list-header">
      <span>FOUND WORDS</span>
      <span id="words-count">0</span>
    </div>
    <div id="words-container">
      <div class="empty-state">Drag across adjacent letters to find words</div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-new">New Game</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading words...</p>
</div>

<script>
// ============================================================
// WORD LIST
// ============================================================
let wordSet = null;

async function loadWords() {
  try {
    const resp = await fetch('words_raw.txt');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    wordSet = new Set(text.trim().split('\n'));
    return true;
  } catch (e) {
    const p = document.querySelector('#loading-overlay p');
    p.textContent = 'Could not load word list. Make sure you are serving via HTTP.';
    console.error('Failed to load words:', e);
    return false;
  }
}

async function init() {
  const ok = await loadWords();
  loadingOverlay.classList.add('hidden');
  if (ok) newGame();
}

// ============================================================
// LETTER DISTRIBUTION
// ============================================================
const WEIGHTS = {
  A:8, B:2, C:3, D:4, E:12, F:2, G:3, H:2, I:8, J:1, K:1, L:4,
  M:2, N:6, O:8, P:2, Q:1, R:6, S:4, T:6, U:4, V:1, W:2, X:1, Y:2, Z:1
};
const LETTERS = Object.keys(WEIGHTS);
const VOWELS = ['A','E','I','O','U'];

function weightedPick() {
  let total = 0;
  for (const l of LETTERS) total += WEIGHTS[l];
  let r = Math.random() * total;
  for (const l of LETTERS) { r -= WEIGHTS[l]; if (r <= 0) return l; }
  return 'E';
}

function generateBoard() {
  for (let attempt = 0; attempt < 20; attempt++) {
    const cells = Array.from({length: 16}, () => weightedPick());
    const vc = cells.filter(c => VOWELS.includes(c)).length;
    if (vc >= 3) return cells;
  }
  // Fallback: force vowels
  const cells = Array.from({length: 16}, () => weightedPick());
  cells[0] = 'A'; cells[3] = 'E'; cells[7] = 'I'; cells[12] = 'O';
  return cells;
}

// ============================================================
// SCORING
// ============================================================
function wordScore(word) {
  const len = word.length;
  if (len < 3) return 0;
  const map = {3:100, 4:200, 5:500, 6:800, 7:1100, 8:1400, 9:1700};
  return map[len] || 1700 + (len - 9) * 300;
}

// ============================================================
// GAME STATE
// ============================================================
const S = {
  board: [],
  selection: [],
  foundWords: new Set(),
  foundList: [],
  score: 0,
};

// ============================================================
// DOM REFS
// ============================================================
const boardEl = document.getElementById('board');
const boardWrapper = document.getElementById('board-wrapper');
const canvas = document.getElementById('board-lines');
const ctx = canvas.getContext('2d');
const currentWordEl = document.getElementById('current-word');
const scoreEl = document.getElementById('score');
const wordsContainer = document.getElementById('words-container');
const wordsCountEl = document.getElementById('words-count');
const loadingOverlay = document.getElementById('loading-overlay');
const scorePopupEl = document.getElementById('score-popup');

// ============================================================
// BOARD RENDER
// ============================================================
function renderBoard() {
  const cells = boardEl.children;

  // Determine live path status
  let pathStatus = '';
  if (S.selection.length >= 3) {
    const word = S.selection.map(t => S.board[t.r * 4 + t.c]).join('');
    const lower = word.toLowerCase();
    if (wordSet && wordSet.has(lower)) {
      pathStatus = S.foundWords.has(word) ? 'dup' : 'valid';
    }
  }

  for (let i = 0; i < 16; i++) {
    const cell = cells[i];
    cell.textContent = S.board[i];
    const row = Math.floor(i / 4);
    const col = i % 4;
    const si = S.selection.findIndex(t => t.r === row && t.c === col);
    cell.className = 'cell';
    if (si >= 0) {
      if (pathStatus === 'valid') cell.classList.add('selected-valid');
      else if (pathStatus === 'dup') cell.classList.add('selected-dup');
      else cell.classList.add('selected');
      if (si === 0) cell.classList.add('first');
    }
  }
  // Current word display
  currentWordEl.className = '';
  const word = S.selection.map(t => S.board[t.r * 4 + t.c]).join('');
  currentWordEl.textContent = word || ' ';
  drawLines(pathStatus);
}

function drawLines(status) {
  const dpr = window.devicePixelRatio || 1;
  const rect = boardWrapper.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.clearRect(0, 0, rect.width, rect.height);

  if (S.selection.length < 2) return;

  // Line color
  let color = 'rgba(74,144,217,0.5)';
  if (status === 'valid') color = 'rgba(52,199,89,0.6)';
  else if (status === 'dup') color = 'rgba(255,149,0,0.6)';

  // Get cell centers relative to canvas
  const cells = boardEl.children;
  const points = S.selection.map(t => {
    const el = cells[t.r * 4 + t.c];
    const cr = el.getBoundingClientRect();
    return {
      x: cr.left - rect.left + cr.width / 2,
      y: cr.top - rect.top + cr.height / 2,
    };
  });

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

// ============================================================
// POINTER / TOUCH HANDLING
// ============================================================
let dragging = false;

function tileAtPoint(x, y) {
  const rect = boardEl.getBoundingClientRect();
  const w = rect.width / 4;
  const h = rect.height / 4;
  // Compute raw cell position
  const col = Math.floor((x - rect.left) / w);
  const row = Math.floor((y - rect.top) / h);
  if (row < 0 || row > 3 || col < 0 || col > 3) return null;
  // Shrink hitbox: only count if finger is well inside the cell
  const cx = rect.left + (col + 0.5) * w;
  const cy = rect.top + (row + 0.5) * h;
  const hw = w * 0.35; // 35% of cell width = 70% of total width
  const hh = h * 0.35;
  if (Math.abs(x - cx) > hw || Math.abs(y - cy) > hh) return null;
  return {r: row, c: col};
}

function isAdj(a, b) {
  return Math.abs(a.r - b.r) <= 1 && Math.abs(a.c - b.c) <= 1
    && !(a.r === b.r && a.c === b.c);
}

function onPointerDown(e) {
  const tile = tileAtPoint(e.clientX, e.clientY);
  if (!tile) return;
  dragging = true;
  S.selection = [tile];
  boardEl.setPointerCapture(e.pointerId);
  renderBoard();
}

function onPointerMove(e) {
  if (!dragging) return;

  const tile = tileAtPoint(e.clientX, e.clientY);
  if (!tile) return;

  const last = S.selection[S.selection.length - 1];
  if (tile.r === last.r && tile.c === last.c) return;
  if (S.selection.some(t => t.r === tile.r && t.c === tile.c)) return;
  if (!isAdj(tile, last)) return;

  S.selection.push(tile);
  renderBoard();
}

function onPointerUp(e) {
  if (!dragging) return;
  dragging = false;
  if (boardEl.hasPointerCapture(e.pointerId)) {
    boardEl.releasePointerCapture(e.pointerId);
  }
  submitWord();
}

boardEl.addEventListener('pointerdown', onPointerDown);
boardEl.addEventListener('pointermove', onPointerMove);
boardEl.addEventListener('pointerup', onPointerUp);
boardEl.addEventListener('pointercancel', () => {
  if (dragging) { dragging = false; submitWord(); }
});

// ============================================================
// WORD SUBMISSION
// ============================================================
function submitWord() {
  const word = S.selection.map(t => S.board[t.r * 4 + t.c]).join('');
  S.selection = [];
  renderBoard();

  if (word.length >= 3 && wordSet && wordSet.has(word.toLowerCase()) && !S.foundWords.has(word)) {
    S.foundWords.add(word);
    S.foundList.unshift({word, score: wordScore(word)});
    S.score += wordScore(word);
    updateScore();
    renderFoundWords();
    showScorePopup(wordScore(word));
  }
}

function showScorePopup(pts) {
  scorePopupEl.textContent = `+${pts}`;
  scorePopupEl.className = 'show';
  setTimeout(() => { scorePopupEl.className = ''; }, 800);
}

// ============================================================
// UI UPDATES
// ============================================================
function updateScore() {
  scoreEl.textContent = S.score;
}

function renderFoundWords() {
  wordsContainer.innerHTML = '';
  if (S.foundList.length === 0) {
    wordsContainer.innerHTML = '<div class="empty-state">Drag across adjacent letters to find words</div>';
    wordsCountEl.textContent = '0';
    return;
  }
  wordsCountEl.textContent = S.foundList.length;
  for (const entry of S.foundList) {
    const div = document.createElement('div');
    div.className = 'word-entry';
    div.innerHTML = `<span class="word-text">${entry.word}</span><span class="word-score">${entry.score}</span>`;
    wordsContainer.appendChild(div);
  }
}

// ============================================================
// NEW GAME
// ============================================================
function newGame() {
  S.board = generateBoard();
  S.selection = [];
  S.foundWords = new Set();
  S.foundList = [];
  S.score = 0;

  // Build board DOM
  boardEl.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const div = document.createElement('div');
    div.className = 'cell';
    boardEl.appendChild(div);
  }

  renderBoard();
  updateScore();
  renderFoundWords();
  currentWordEl.textContent = 'Drag to play';
  currentWordEl.className = 'hint';
}

// ============================================================
// INIT
// ============================================================
document.getElementById('btn-new').addEventListener('click', newGame);

init();
</script>
</body>
</html>
