<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Word Arena</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Base grid rows set by JS; placeholder to avoid FOUC */
    </style>
  </head>
  <body>
    <div id="game">
      <header>
        <!-- <h1>WORD ARENA</h1> -->
        <div class="stats">
          <div class="stat">
            <span>SCORE</span>
            <span class="stat-value" id="score">0</span>
          </div>
        </div>
      </header>

      <div id="board-wrapper">
        <canvas id="board-lines"></canvas>
        <div id="board"></div>
      </div>

      <div id="current-word-area">
        <div id="current-word">&nbsp;</div>
      </div>

      <div id="word-list">
        <div id="word-list-header">
          <span>FOUND WORDS</span>
          <span style="display: flex; gap: 12px; align-items: center">
            <span id="words-count">0</span>
            <button id="solutions-btn" class="solutions-btn">SOLUTIONS</button>
          </span>
        </div>
        <div id="words-container">
          <div class="empty-state">
            Drag across adjacent letters to find words
          </div>
        </div>
      </div>

      <div id="controls">
        <button id="btn-new">New Game</button>
        <button id="btn-reset">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M1 4v6h6"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
        <button id="btn-edit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
            <path d="m15 5 4 4"/>
          </svg>
        </button>
        <button id="btn-settings">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.87 6.87 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"
            />
          </svg>
        </button>
      </div>

      <div id="settings-modal">
        <div id="settings-panel">
          <h2>Board Size</h2>
          <div id="size-picker"></div>
          <h2 style="margin-top: 20px">Theme</h2>
          <div id="theme-picker"></div>
          <div style="margin-top: 16px;">
            <button id="btn-mute">
              <svg width="20" height="20" viewBox="0 0 24 24" class="icon-on" fill="none">
                <path d="M11 5 6 9H2v6h4l5 4V5z"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              <svg width="20" height="20" viewBox="0 0 24 24" class="icon-off" fill="none">
                <path d="M11 5 6 9H2v6h4l5 4V5z"/>
                <line x1="23" y1="9" x2="17" y2="15"/>
                <line x1="17" y1="9" x2="23" y2="15"/>
              </svg>
            </button>
          </div>
          <button id="btn-close-settings">Done</button>
          <div style="margin-top: 16px; display: flex; flex-direction: column; align-items: center; gap: 6px;">
            <button id="btn-hard-reload" style="background:none;border:none;color:var(--text-faint);font-size:11px;cursor:pointer;text-decoration:underline;text-underline-offset:2px;">Hard Reload</button>
            <div id="version-display" style="font-size: 11px; color: var(--text-faint);"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>Loading words...</p>
    </div>

    <script src="config.js"></script>
    <script src="words.js"></script>
    <script src="game.js"></script>
  </body>
</html>
